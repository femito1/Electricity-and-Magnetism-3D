<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E&M 3D Visualizer</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="mobile-bar">
    <button id="btn-sidebar" title="Open menu" data-i18n-title="ui.openMenu">&#9776;</button>
    <button id="btn-panel" title="Open parameters" data-i18n-title="ui.openParameters">&#9881;</button>
  </div>
  <div id="overlay-backdrop" class="overlay-backdrop"></div>
  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-header">
        <span class="logo">E&amp;M</span>
        <span class="logo-sub">3D Visualizer</span>
        <div class="sidebar-header-actions">
          <button id="btn-formula-sheet" class="sidebar-action-btn" title="Formula Study Sheet" data-i18n-title="ui.formulaSheet">&#128196; <span data-i18n="ui.studySheet">Study Sheet</span></button>
          <button id="btn-concept-map" class="sidebar-action-btn" title="Concept Map" data-i18n-title="ui.conceptMap">&#128279; <span data-i18n="ui.conceptMap">Concept Map</span></button>
        </div>
      </div>
      <div id="sidebar-search">
        <input type="text" placeholder="Search problems..." id="search-input" data-i18n-placeholder="ui.searchPlaceholder">
      </div>
      <div id="sidebar-nav"></div>
    </nav>

    <div id="viewport-container">
      <div id="lang-switcher" class="lang-switcher">
        <button type="button" class="lang-btn active" data-lang="en">EN</button>
        <button type="button" class="lang-btn" data-lang="pt">PT</button>
      </div>
      <div id="viewport"></div>
      <div id="viewport-controls">
        <div id="toggle-buttons"></div>
        <div id="anim-controls" class="hidden">
          <button id="play-pause-btn" title="Play/Pause" data-i18n-title="ui.playPause">&#9192;</button>
          <label data-i18n="ui.speed">Speed:</label>
          <input type="range" id="speed-range" min="0.1" max="3" step="0.1" value="1">
          <span id="speed-val">1.0x</span>
        </div>
      </div>
    </div>

    <aside id="info-panel">
      <div class="panel-section">
        <h2 id="scene-title">Welcome</h2>
        <p id="scene-desc">Select a problem from the sidebar to begin exploring electricity and magnetism in 3D.</p>
      </div>
      <div id="equations-section" class="panel-section"></div>
      <div id="limits-section" class="panel-section"></div>
      <div id="params-section" class="panel-section">
        <h3 data-i18n="ui.parameters">Parameters</h3>
        <div id="sliders"></div>
      </div>
    </aside>
  </div>

  <!-- Formula Sheet Overlay -->
  <div id="formula-sheet-overlay" class="full-overlay">
    <div class="overlay-header">
      <h2 data-i18n="ui.formulaSheet">Formula Study Sheet</h2>
      <div class="overlay-header-actions">
        <button id="formula-sheet-print" class="sidebar-action-btn">&#128424; <span data-i18n="ui.print">Print</span></button>
        <button id="formula-sheet-close" class="overlay-close-btn">&times;</button>
      </div>
    </div>
    <div class="overlay-toolbar">
      <label class="overlay-checkbox"><input type="checkbox" id="formula-sheet-select-all" checked> <span data-i18n="ui.selectAll">Select All</span></label>
      <label class="overlay-checkbox"><input type="checkbox" id="formula-sheet-derivations"> <span data-i18n="ui.includeDerivations">Include Derivations</span></label>
    </div>
    <div id="formula-sheet-chapters" class="overlay-toolbar chapter-checks"></div>
    <div id="formula-sheet-content" class="sheet-content"></div>
  </div>

  <!-- Concept Map Overlay -->
  <div id="concept-map-overlay" class="full-overlay">
    <div class="overlay-header">
      <h2 data-i18n="ui.conceptMap">Concept Map</h2>
      <button id="concept-map-close" class="overlay-close-btn">&times;</button>
    </div>
    <div id="concept-map-container"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
